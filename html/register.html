<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetourMistral - Inscription</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>RetourMistral</h1>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Pseudo" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Mot de passe" required>
                    <div class="password-requirements">
                        <p id="length-check">❌ 10 caractères minimum</p>
                        <p id="uppercase-check">❌ 1 majuscule</p>
                        <p id="lowercase-check">❌ 1 minuscule</p>
                        <p id="number-check">❌ 1 chiffre</p>
                        <p id="special-check">❌ 1 caractère spécial</p>
                    </div>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
                </div>
                <button type="submit">S'inscrire</button>
            </form>
            <p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
    <script type="module" src="../js/register.js"></script>
</body>
</html>

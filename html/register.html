<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetourMistral - Inscription</title>
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>RetourMistral</h1>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Pseudo" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Mot de passe" required>
                    <div class="password-requirements">
                        <p id="length-check">❌ 10 caractères minimum</p>
                        <p id="uppercase-check">❌ 1 majuscule</p>
                        <p id="lowercase-check">❌ 1 minuscule</p>
                        <p id="number-check">❌ 1 chiffre</p>
                        <p id="special-check">❌ 1 caractère spécial</p>
                    </div>
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
                </div>
                <button type="submit">S'inscrire</button>
            </form>
            <p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEvK9CVWCmNGmOvHtwNnEJ65A_33JgSq0",
            authDomain: "retour-mistral.firebaseapp.com",
            projectId: "retour-mistral",
            storageBucket: "retour-mistral.firebasestorage.app",
            messagingSenderId: "663337089772",
            appId: "1:663337089772:web:034e2446b73fa9701f03c9"
        };

        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();
    </script>
    <script>
        // Fonction de validation du mot de passe
        function validatePassword(password) {
            const checks = {
                length: password.length >= 10,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };

            // Mettre à jour les indicateurs visuels
            Object.keys(checks).forEach(check => {
                const element = document.getElementById(`${check}-check`);
                if (checks[check]) {
                    element.textContent = '✅ ' + element.textContent.slice(2);
                    element.classList.add('valid');
                    element.classList.remove('invalid');
                } else {
                    element.textContent = '❌ ' + element.textContent.slice(2);
                    element.classList.add('invalid');
                    element.classList.remove('valid');
                }
            });

            return Object.values(checks).every(check => check === true);
        }

        // Écouter les changements du mot de passe
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const registerForm = document.getElementById('registerForm');

        passwordInput.addEventListener('input', () => {
            validatePassword(passwordInput.value);
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Vérifier le mot de passe
            if (!validatePassword(password)) {
                alert('Le mot de passe ne respecte pas les critères requis.');
                return;
            }

            // Vérifier la confirmation du mot de passe
            if (password !== confirmPassword) {
                alert('Les mots de passe ne correspondent pas.');
                return;
            }

            try {
                const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                await window.db.collection('users').doc(user.uid).set({
                    username,
                    email,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });

                window.location.href = 'saisie-retour.html';
            } catch (error) {
                console.error('Erreur:', error);
                let errorMessage = 'Une erreur est survenue lors de l\'inscription.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Cet email est déjà utilisé.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'L\'adresse email n\'est pas valide.';
                        break;
                    case 'auth/operation-not-allowed':
                        errorMessage = 'L\'inscription par email/mot de passe n\'est pas activée.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Le mot de passe est trop faible.';
                        break;
                }
                
                alert(errorMessage);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetourMistral - Mon Compte</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/compte.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">RetourMistral</div>
        <div class="nav-links">
            <a href="saisie-retour.html">Saisie Retour</a>
            <a href="consultation.html">Consultation</a>
            <a href="compte.html" class="active">Mon Compte</a>
        </div>
        <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </nav>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <h1>Profil Utilisateur</h1>
                <button id="editBtn" class="edit-btn">Modifier</button>
            </div>

            <div class="profile-content">
                <div class="profile-field">
                    <label>Pseudo</label>
                    <span id="usernamefield"></span>
                </div>

                <div class="profile-field">
                    <label>Email</label>
                    <span id="emailfield"></span>
                </div>

                <div class="profile-field">
                    <label>Date d'inscription</label>
                    <span id="createdAtField"></span>
                </div>
            </div>

            <div class="stats-section">
                <h2>Total des Retours</h2>
                <div class="stats-number" id="totalRetours">0</div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Modifier le profil</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="newUsername">Nouveau pseudo</label>
                    <input type="text" id="newUsername" class="form-input">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                <button class="btn btn-primary" onclick="saveChanges()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCEvK9CVWCmNGmOvHtwNnEJ65A_33JgSq0",
            authDomain: "retour-mistral.firebaseapp.com",
            projectId: "retour-mistral",
            storageBucket: "retour-mistral.firebasestorage.app",
            messagingSenderId: "663337089772",
            appId: "1:663337089772:web:034e2446b73fa9701f03c9"
        };

        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();

        // Vérification de l'authentification et chargement des données
        window.auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            await loadUserProfile(user);
            await loadUserStats(user);
        });

        async function loadUserProfile(user) {
            try {
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();

                document.getElementById('usernamefield').textContent = userData.username;
                document.getElementById('emailfield').textContent = user.email;
                
                // Formater la date d'inscription
                const createdAt = new Date(userData.createdAt);
                const formattedDate = createdAt.toLocaleDateString('fr-FR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
                document.getElementById('createdAtField').textContent = formattedDate;
            } catch (error) {
                console.error('Erreur lors du chargement du profil:', error);
            }
        }

        async function loadUserStats(user) {
            try {
                const retoursRef = window.db.collection('users').doc(user.uid).collection('retours');
                const snapshot = await retoursRef.get();
                document.getElementById('totalRetours').textContent = snapshot.size;
            } catch (error) {
                console.error('Erreur lors du chargement des statistiques:', error);
            }
        }

        // Gestion de la déconnexion
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await window.auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Erreur lors de la déconnexion:', error);
            }
        });

        function openModal() {
            const modal = document.getElementById('editModal');
            const input = document.getElementById('newUsername');
            input.value = document.getElementById('usernamefield').textContent;
            modal.style.display = 'block';
            input.focus();
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Animation d'entrée
            setTimeout(() => notification.classList.add('show'), 10);
            
            // Suppression automatique
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        async function saveChanges() {
            try {
                const newUsername = document.getElementById('newUsername').value.trim();
                if (!newUsername) {
                    showNotification('Le pseudo ne peut pas être vide', 'error');
                    return;
                }

                const userId = window.auth.currentUser.uid;
                await window.db.collection('users').doc(userId).update({
                    username: newUsername,
                    updatedAt: new Date().toISOString()
                });

                document.getElementById('usernamefield').textContent = newUsername;
                closeModal();
                showNotification('Profil mis à jour avec succès');
            } catch (error) {
                console.error('Erreur lors de la modification:', error);
                showNotification('Erreur lors de la modification du profil', 'error');
            }
        }

        document.getElementById('editBtn').addEventListener('click', openModal);

        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>

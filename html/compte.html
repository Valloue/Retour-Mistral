<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetourMistral - Mon Compte</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/compte.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">RetourMistral</div>
        <div class="nav-links">
            <a href="saisie-retour.html">Saisie Retour</a>
            <a href="consultation.html">Consultation</a>
            <a href="compte.html" class="active">Mon Compte</a>
        </div>
        <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </nav>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <h1>Profil Utilisateur</h1>
                <button id="editBtn" class="edit-btn">Modifier</button>
            </div>

            <div class="profile-content">
                <div class="profile-field">
                    <label>Pseudo</label>
                    <span id="usernamefield"></span>
                </div>

                <div class="profile-field">
                    <label>Email</label>
                    <span id="emailfield"></span>
                </div>

                <div class="profile-field">
                    <label>Date d'inscription</label>
                    <span id="createdAtField"></span>
                </div>
            </div>

            <div class="stats-section">
                <h2>Total des Retours</h2>
                <div class="stats-number" id="totalRetours">0</div>
            </div>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCEvK9CVWCmNGmOvHtwNnEJ65A_33JgSq0",
            authDomain: "retour-mistral.firebaseapp.com",
            projectId: "retour-mistral",
            storageBucket: "retour-mistral.firebasestorage.app",
            messagingSenderId: "663337089772",
            appId: "1:663337089772:web:034e2446b73fa9701f03c9"
        };

        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();

        // Vérification de l'authentification et chargement des données
        window.auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            await loadUserProfile(user);
            await loadUserStats(user);
        });

        async function loadUserProfile(user) {
            try {
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();

                document.getElementById('usernamefield').textContent = userData.username;
                document.getElementById('emailfield').textContent = user.email;
                
                // Formater la date d'inscription
                const createdAt = new Date(userData.createdAt);
                const formattedDate = createdAt.toLocaleDateString('fr-FR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
                document.getElementById('createdAtField').textContent = formattedDate;
            } catch (error) {
                console.error('Erreur lors du chargement du profil:', error);
            }
        }

        async function loadUserStats(user) {
            try {
                const retoursRef = window.db.collection('users').doc(user.uid).collection('retours');
                const snapshot = await retoursRef.get();
                document.getElementById('totalRetours').textContent = snapshot.size;
            } catch (error) {
                console.error('Erreur lors du chargement des statistiques:', error);
            }
        }

        // Gestion de la déconnexion
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await window.auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Erreur lors de la déconnexion:', error);
            }
        });
    </script>
</body>
</html>

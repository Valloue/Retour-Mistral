<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetourMistral - Saisie Retour</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/saisie-retour.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">RetourMistral</div>
        <div class="nav-links">
            <a href="saisie-retour.html" class="active">Saisie Retour</a>
            <a href="consultation.html">Consultation</a>
            <a href="compte.html">Mon Compte</a>
        </div>
        <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </nav>

    <div class="container">
        <div class="sidebar">
            <div class="section">
                <h2>Activités Matin</h2>
                <div id="activitesMatin" class="activities-list"></div>
                <button class="add-btn" data-section="matin">+ Ajouter une activité</button>
            </div>

            <div class="section">
                <h2>Activités Après-midi</h2>
                <div id="activitesApresMidi" class="activities-list"></div>
                <button class="add-btn" data-section="apresMidi">+ Ajouter une activité</button>
            </div>

            <div class="section">
                <h2>Problématiques</h2>
                <div id="problematiques" class="activities-list"></div>
                <button class="add-btn" data-section="problematiques">+ Ajouter une problématique</button>
            </div>
        </div>

        <div class="main-content">
            <div id="retourTitle" class="retour-title"></div>
            <div id="editor" class="editor">
                <p>Sélectionnez une activité pour commencer l'édition...</p>
            </div>
        </div>
    </div>

    <!-- Initialisation Firebase -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEvK9CVWCmNGmOvHtwNnEJ65A_33JgSq0",
            authDomain: "retour-mistral.firebaseapp.com",
            projectId: "retour-mistral",
            storageBucket: "retour-mistral.firebasestorage.app",
            messagingSenderId: "663337089772",
            appId: "1:663337089772:web:034e2446b73fa9701f03c9"
        };

        firebase.initializeApp(firebaseConfig);
        window.auth = firebase.auth();
        window.db = firebase.firestore();
    </script>

    <!-- Logique de l'application -->
    <script>
        // Vérification de l'authentification et création du retour quotidien
        window.auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            try {
                // Récupérer les données de l'utilisateur
                const userDoc = await window.db.collection('users').doc(user.uid).get();
                const username = userDoc.data().username;
                
                // Créer le retour du jour
                const today = new Date().toISOString().split('T')[0];
                const formattedDate = formatDate(new Date());
                const retourTitle = `Retour ${username} ${formattedDate}`;
                
                // Référence au document du jour
                const userDayRef = window.db.collection('users')
                    .doc(user.uid)
                    .collection('retours')
                    .doc(today);

                // Vérifier si le retour existe déjà
                const doc = await userDayRef.get();
                if (!doc.exists) {
                    // Créer un nouveau retour pour aujourd'hui
                    await userDayRef.set({
                        '1_date': today,
                        '2_title': retourTitle,
                        '3_matin': {
                            activites: {}
                        },
                        '4_apresMidi': {
                            activites: {}
                        },
                        '5_problematiques': {
                            items: {}
                        }
                    });
                    console.log('Nouveau retour créé pour aujourd\'hui');
                }

                // Mettre à jour le titre dans l'interface
                document.getElementById('retourTitle').textContent = retourTitle;

                // Charger les activités existantes
                await loadActivities();

            } catch (error) {
                console.error('Erreur lors de l\'initialisation:', error);
                alert('Erreur lors de l\'initialisation de la page');
            }
        });

        // Gestion de la déconnexion
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await window.auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Erreur lors de la déconnexion:', error);
            }
        });

        // Gestion des activités
        const addButtons = document.querySelectorAll('.add-btn');
        const activitesLists = {
            matin: document.getElementById('activitesMatin'),
            apresMidi: document.getElementById('activitesApresMidi'),
            problematiques: document.getElementById('problematiques')
        };

        addButtons.forEach(button => {
            button.addEventListener('click', () => {
                const section = button.dataset.section;
                createNewActivity(section);
            });
        });

        async function createNewActivity(section) {
            const title = prompt(`Nouvelle activité ${section}`);
            if (!title) return;

            try {
                const userId = window.auth.currentUser.uid;
                const today = new Date().toISOString().split('T')[0];
                
                // Récupérer le nom d'utilisateur
                const userDoc = await window.db.collection('users').doc(userId).get();
                const username = userDoc.data().username;
                
                // Formater la date pour le titre
                const formattedDate = formatDate(new Date());
                const retourTitle = `Retour ${username} ${formattedDate}`;
                
                // Créer/obtenir le document du jour pour l'utilisateur
                const userDayRef = window.db.collection('users')
                    .doc(userId)
                    .collection('retours')
                    .doc(today);

                // Vérifier si le document existe déjà
                const doc = await userDayRef.get();
                if (!doc.exists) {
                    await userDayRef.set({
                        '1_date': today,
                        '2_title': retourTitle,
                        '3_matin': {
                            activites: {}
                        },
                        '4_apresMidi': {
                            activites: {}
                        },
                        '5_problematiques': {
                            items: {}
                        }
                    });
                }

                // Générer un ID unique pour l'activité
                const activityId = window.db.collection('_').doc().id;

                // Définir le chemin selon la section
                let updatePath;
                if (section === 'matin') {
                    updatePath = `3_matin.activites.${activityId}`;
                } else if (section === 'apresMidi') {
                    updatePath = `4_apresMidi.activites.${activityId}`;
                } else {
                    updatePath = `5_problematiques.items.${activityId}`;
                }

                // Créer l'objet de mise à jour
                const update = {};
                update[updatePath] = {
                    title: title,
                    content: '',
                    createdAt: new Date().toISOString()
                };

                // Mettre à jour le document
                await userDayRef.update(update);

                // Ajouter à la liste dans l'interface
                addActivityToList(section, {
                    id: activityId,
                    title: title
                });
            } catch (error) {
                console.error('Erreur lors de la création:', error);
                alert('Erreur lors de la création');
            }
        }

        function addActivityToList(section, activity) {
            const div = document.createElement('div');
            div.className = 'activity-item';
            div.dataset.id = activity.id;
            div.textContent = activity.title;
            div.onclick = () => selectActivity(activity.id);

            activitesLists[section].appendChild(div);
        }

        async function selectActivity(activityId) {
            try {
                const userId = window.auth.currentUser.uid;
                const today = new Date().toISOString().split('T')[0];
                const userDayRef = window.db.collection('users')
                    .doc(userId)
                    .collection('retours')
                    .doc(today);

                const doc = await userDayRef.get();
                const data = doc.data();

                // Désélectionner l'activité précédente
                document.querySelectorAll('.activity-item.active').forEach(item => {
                    item.classList.remove('active');
                });

                // Sélectionner la nouvelle activité
                const activityElement = document.querySelector(`[data-id="${activityId}"]`);
                activityElement.classList.add('active');

                // Chercher l'activité dans toutes les sections
                let activityData;
                let updatePath;

                if (data['3_matin'].activites?.[activityId]) {
                    activityData = data['3_matin'].activites[activityId];
                    updatePath = `3_matin.activites.${activityId}`;
                } else if (data['4_apresMidi'].activites?.[activityId]) {
                    activityData = data['4_apresMidi'].activites[activityId];
                    updatePath = `4_apresMidi.activites.${activityId}`;
                } else if (data['5_problematiques'].items?.[activityId]) {
                    activityData = data['5_problematiques'].items[activityId];
                    updatePath = `5_problematiques.items.${activityId}`;
                }

                if (!activityData) {
                    console.error('Activité non trouvée');
                    return;
                }

                // Créer et configurer la zone de texte
                const editor = document.getElementById('editor');
                editor.innerHTML = `
                    <div class="editor-content">
                        <div class="editor-toolbar">
                            <button onclick="formatDoc('bold')" title="Gras">B</button>
                            <button onclick="formatDoc('italic')" title="Italique">I</button>
                            <button onclick="formatDoc('underline')" title="Souligné">U</button>
                            <button onclick="formatDoc('insertunorderedlist')" title="Liste à puces">•</button>
                            <button onclick="formatDoc('insertorderedlist')" title="Liste numérotée">1.</button>
                        </div>
                        <div id="activityContent" 
                             class="editable-content" 
                             contenteditable="true"
                        >${activityData.content || ''}</div>
                    </div>
                `;

                // Fonction de formatage
                window.formatDoc = function(cmd) {
                    document.execCommand(cmd, false, null);
                    document.getElementById('activityContent').focus();
                };

                // Ajouter l'écouteur d'événements pour la sauvegarde automatique
                const contentDiv = document.getElementById('activityContent');
                let saveTimeout;

                contentDiv.addEventListener('input', () => {
                    if (saveTimeout) clearTimeout(saveTimeout);
                    
                    saveTimeout = setTimeout(async () => {
                        try {
                            const update = {};
                            update[`${updatePath}.content`] = contentDiv.innerHTML;
                            update[`${updatePath}.updatedAt`] = new Date().toISOString();

                            await userDayRef.update(update);
                            console.log('Contenu sauvegardé');
                        } catch (error) {
                            console.error('Erreur lors de la sauvegarde:', error);
                            alert('Erreur lors de la sauvegarde');
                        }
                    }, 500);
                });

                // Gestion des puces avec le tiret
                contentDiv.addEventListener('input', (e) => {
                    const selection = window.getSelection();
                    const range = selection.getRangeAt(0);
                    const node = range.startContainer;
                    
                    if (node.nodeType === 3) { // Node.TEXT_NODE
                        const text = node.textContent;
                        if (text === '- ') {
                            // Supprimer le "- "
                            node.textContent = '';
                            // Créer une liste à puces
                            document.execCommand('insertUnorderedList');
                            // Donner le focus
                            contentDiv.focus();
                        }
                    }
                });

                // Gestion de l'indentation et désindentation
                contentDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Tab' || e.key === 'Enter') {
                        const selection = window.getSelection();
                        const range = selection.getRangeAt(0);
                        let element = range.startContainer;
                        
                        // Remonter jusqu'à trouver un élément li
                        while (element && element.nodeName !== 'LI') {
                            element = element.parentElement;
                        }
                        
                        if (element) { // Si on est dans une puce
                            if (e.key === 'Tab') {
                                e.preventDefault();
                                
                                if (e.shiftKey) {
                                    // Désindenter
                                    const parentList = element.parentElement;
                                    const grandParentLi = parentList.parentElement;
                                    if (grandParentLi && grandParentLi.nodeName === 'LI') {
                                        const greatGrandParentList = grandParentLi.parentElement;
                                        greatGrandParentList.insertBefore(element, grandParentLi.nextSibling);
                                    }
                                } else {
                                    // Indenter
                                    const prevLi = element.previousElementSibling;
                                    if (prevLi) {
                                        let subList = prevLi.querySelector('ul');
                                        if (!subList) {
                                            subList = document.createElement('ul');
                                            prevLi.appendChild(subList);
                                        }
                                        subList.appendChild(element);
                                    }
                                }
                            } else if (e.key === 'Enter' && element.textContent.trim() === '') {
                                e.preventDefault();
                                // Supprimer la puce vide
                                const parentList = element.parentElement;
                                element.remove();
                                if (parentList.children.length === 0) {
                                    parentList.remove();
                                }
                                document.execCommand('insertParagraph');
                            }
                        }
                    }
                });

                // Ajouter un gestionnaire pour le collage de texte propre
                contentDiv.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const text = e.clipboardData.getData('text/plain');
                    document.execCommand('insertText', false, text);
                });

                // Donner le focus à la zone de texte
                contentDiv.focus();

            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur lors du chargement de l\'activité');
            }
        }

        // Charger les activités existantes
        async function loadActivities() {
            try {
                const userId = window.auth.currentUser.uid;
                const today = new Date().toISOString().split('T')[0];
                
                // Récupérer le nom d'utilisateur
                const userDoc = await window.db.collection('users').doc(userId).get();
                const username = userDoc.data().username;
                
                // Formater la date pour le titre
                const formattedDate = formatDate(new Date());
                const retourTitle = `Retour ${username} ${formattedDate}`;
                
                // Récupérer le document du jour
                const userDayRef = window.db.collection('users')
                    .doc(userId)
                    .collection('retours')
                    .doc(today);

                const doc = await userDayRef.get();
                
                // Si le document n'existe pas, le créer
                if (!doc.exists) {
                    await userDayRef.set({
                        '1_date': today,
                        '2_title': retourTitle,
                        '3_matin': {
                            activites: {}
                        },
                        '4_apresMidi': {
                            activites: {}
                        },
                        '5_problematiques': {
                            items: {}
                        }
                    });
                    return; // Retourner car il n'y a pas encore d'activités à charger
                }

                const data = doc.data();

                // Charger les activités existantes
                if (data['3_matin'] && data['3_matin'].activites) {
                    Object.entries(data['3_matin'].activites).forEach(([id, activity]) => {
                        addActivityToList('matin', { id, title: activity.title });
                    });
                }

                if (data['4_apresMidi'] && data['4_apresMidi'].activites) {
                    Object.entries(data['4_apresMidi'].activites).forEach(([id, activity]) => {
                        addActivityToList('apresMidi', { id, title: activity.title });
                    });
                }

                if (data['5_problematiques'] && data['5_problematiques'].items) {
                    Object.entries(data['5_problematiques'].items).forEach(([id, problem]) => {
                        addActivityToList('problematiques', { id, title: problem.title });
                    });
                }

                // Mettre à jour le titre dans l'interface
                document.getElementById('retourTitle').textContent = data['2_title'] || retourTitle;

            } catch (error) {
                console.error('Erreur lors du chargement:', error);
            }
        }

        // Fonction pour formater la date
        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}`;
        }

        // Ajouter cette fonction utilitaire
        function isStartOfLine(node) {
            const range = document.createRange();
            range.selectNodeContents(node);
            range.collapse(true);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(node.parentNode);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            const text = preCaretRange.toString();
            return text.trim().length === 0 || text.endsWith('\n');
        }
    </script>
</body>
</html>
